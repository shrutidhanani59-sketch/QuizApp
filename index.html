<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="start">
        <h1>Start</h1>
    </div>

    

    <div class="wrapper">

        <h2> 📝 Quize App</h2>

        <div class="timer">
            <p> <span> 01 </span> : <span>00</span></p>
        </div>

        <div class="quaction">
            
        </div>

        <div class="buttons">
           <form id="myform">
             <input type="button" class="btn pre no-cursor"  value="← Previous">
            <input type="Submit" class="Submit"  value="Submit">
            <input type="button" class="btn next"  value="→ Next">
           </form>
        </div>
    
    </div>

    <div class="result none"></div>
    


    <script src="script.js"></script>
    <p></p>
</body>

</html>
